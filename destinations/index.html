<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Proposal Spots</title>
<meta id="page-description" name="description" content="">
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #F4F1EB;
  --bg2:      #EDEAE2;
  --bg3:      #E8E4DB;
  --white:    #FDFCFA;
  --ink:      #1C1C1C;
  --ink2:     #2E2C2A;
  --mid:      #6B6660;
  --muted:    #9E9890;
  --hairline: #D8D2C8;
  --divider:  #E4E0D8;
  --accent:   #8C7B64;
  --accent2:  #B5A48C;
  --shadow:   rgba(28,28,28,0.06);
}

html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

body {
  font-family: 'Jost', sans-serif;
  background: var(--bg);
  color: var(--ink);
  overflow-x: hidden;
  min-height: 100vh;
}

/* ─────────────────────────────────────
   PAGE LAYOUT
───────────────────────────────────── */
.dest-page {
  max-width: 1200px;
  margin: 0 auto;
  padding: 120px 40px 80px;
}

.dest-header {
  margin-bottom: 56px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--divider);
}

.dest-eyebrow {
  font-family: 'Jost', sans-serif;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
  display: block;
}

.dest-h1 {
  font-family: 'Cormorant', serif;
  font-size: 52px;
  font-weight: 300;
  color: var(--ink);
  letter-spacing: -0.01em;
  line-height: 1.1;
  margin-bottom: 16px;
}

.dest-intro {
  font-family: 'Jost', sans-serif;
  font-size: 14px;
  font-weight: 300;
  color: var(--mid);
  line-height: 1.75;
  max-width: 620px;
}

.dest-results-label {
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 24px;
}

/* ─────────────────────────────────────
   SPOT CARDS — verbatim from index.html
───────────────────────────────────── */
.spots-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  width: 100%;
}
.spot-card {
  overflow: hidden;
  cursor: pointer;
  background: none;
  border: none;
  transition: opacity 0.2s;
}
.spot-card:hover { opacity: 0.93; }
.spot-card-img {
  aspect-ratio: 3/4;
  min-height: 320px;
  background: var(--bg3);
  position: relative;
  overflow: hidden;
  border-radius: 4px;
}
.img-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: transform 0.6s ease;
}
.spot-card:hover .img-bg { transform: scale(1.04); }
.spot-card-img::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    transparent 35%,
    rgba(18,14,10,0.72) 100%
  );
  pointer-events: none;
}
.spot-card-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 24px 18px 18px;
  z-index: 1;
}
.spot-card-badge {
  position: absolute; top: 12px; left: 12px;
  background: rgba(165,90,74,0.82);
  backdrop-filter: blur(8px);
  color: var(--white);
  font-family: 'Jost', sans-serif;
  font-size: 8px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 4px 11px;
  border-radius: 100px;
  z-index: 2;
}
.spot-save {
  position: absolute; top: 12px; right: 12px;
  width: 30px; height: 30px;
  background: rgba(253,252,250,0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(253,252,250,0.22);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: rgba(244,241,235,0.85);
  z-index: 2;
  cursor: pointer;
  transition: background 0.15s;
}
.spot-save:hover { background: rgba(253,252,250,0.28); }
.spot-card-market {
  font-family: 'Jost', sans-serif;
  font-size: 8px;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(244,241,235,0.5);
  display: block;
  margin-bottom: 5px;
}
.spot-card-name {
  font-family: 'Cormorant', serif;
  font-size: 21px;
  font-weight: 400;
  color: #fdfcfa;
  line-height: 1.15;
  letter-spacing: 0.01em;
  margin-bottom: 7px;
}
.spot-card-hook {
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  font-weight: 300;
  color: rgba(244,241,235,0.68);
  line-height: 1.5;
  letter-spacing: 0.01em;
  font-style: italic;
}
.spot-card-body {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 2px 12px;
}
.spot-card-summary { display: none; }
.spot-card-tags { display: none; }
.spot-card-tag { display: none; }
.spot-card-price-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.spot-card-price-signal {
  font-family: 'Jost', sans-serif;
  font-size: 10.5px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.03em;
  line-height: 1;
}
.spot-card-price-signal strong {
  font-weight: 400;
  color: var(--ink);
}
.spot-card-price-divider {
  width: 1px;
  height: 10px;
  background: var(--hairline);
  flex-shrink: 0;
}
.spot-card-footer {
  display: flex; align-items: center; gap: 8px;
}
.spot-card-budget-new {
  font-family: 'Jost', sans-serif;
  font-size: 11px; font-weight: 300;
  color: var(--mid); letter-spacing: 0.02em;
}
.spot-card-meta-tags {
  display: flex; align-items: center; gap: 8px;
  margin-left: auto;
}
.spot-card-meta-tag {
  font-family: 'Jost', sans-serif;
  font-size: 10px; font-weight: 300;
  color: var(--muted); letter-spacing: 0.01em;
}

/* ─────────────────────────────────────
   EMPTY / LOADING STATES
───────────────────────────────────── */
.dest-empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 64px 0;
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.05em;
}

.dest-404 {
  text-align: center;
  padding: 120px 40px;
  font-family: 'Jost', sans-serif;
  color: var(--muted);
}
.dest-404 h1 {
  font-family: 'Cormorant', serif;
  font-size: 42px;
  font-weight: 300;
  color: var(--ink);
  margin-bottom: 12px;
}

/* ─────────────────────────────────────
   RESPONSIVE
───────────────────────────────────── */
@media (max-width: 900px) {
  .dest-page { padding: 100px 24px 60px; }
  .dest-h1 { font-size: 38px; }
  .spots-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 560px) {
  .dest-page { padding: 88px 16px 48px; }
  .dest-h1 { font-size: 30px; }
  .spots-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- nav.js injects the navbar -->
<script src="/nav.js"></script>

<div id="dest-root"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  DESTINATION SLUG → DISPLAY NAME MAP
// ═══════════════════════════════════════════════════════════
const DEST_NAMES = {
  'santorini':       'Santorini',
  'bali':            'Bali',
  'amalfi-coast':    'Amalfi Coast',
  'maldives':        'Maldives',
  'costa-rica':      'Costa Rica',
  'tulum':           'Tulum',
  'portugal':        'Portugal',
  'south-of-france': 'South of France',
  'switzerland':     'Switzerland',
  'nicaragua':       'Nicaragua'
};

// ── Resolve slug from URL path ──────────────────────────────
const slug = window.location.pathname.split('/').filter(Boolean).pop();
const destName = DEST_NAMES[slug] || null;

// ═══════════════════════════════════════════════════════════
//  AIRTABLE CONFIGURATION
//  ─────────────────────────────────────────────────────────
//  When you have your credentials, replace the three values
//  below and set AIRTABLE_LIVE = true.
//  That's the only change needed to go fully live.
// ═══════════════════════════════════════════════════════════
const AIRTABLE_LIVE  = true;
const AIRTABLE_BASE  = 'appN5GFcdPJvU1qff';
const AIRTABLE_TABLE = 'tblgpEUkpph612Hw5';
const AIRTABLE_TOKEN = 'AIRTABLE_TOKEN_PLACEHOLDER';

// ─────────────────────────────────────────────────────────
//  LIVE FETCH FROM AIRTABLE (direct — no backend needed for
//  read-only public data, but token is visible in source.
//  For production, proxy through Vercel — see comments.)
// ─────────────────────────────────────────────────────────
async function fetchFromAirtable() {
  try {
    // Call our secure Vercel proxy — token never exposed in browser
    const response = await fetch('/api/spots');

    if (!response.ok) {
      console.error('API error:', response.status);
      console.warn('→ Falling back to mock data.');
      return MOCK_SPOTS;
    }

    const data = await response.json();

    if (!data.records?.length) {
      console.warn('API returned 0 records. Check Status field is set to "Published" in Airtable.');
      return MOCK_SPOTS;
    }

    console.log(`✓ Airtable: loaded ${data.records.length} spots`);
    if (data.records.length) {
      console.log('Airtable field names:', Object.keys(data.records[0].fields).sort().join(', '));
    }

    return data.records.map(r => {
      const f = r.fields;

      const rawPrivacy = f['Privacy'] || '';
      const privacy = rawPrivacy.includes('Private') ? 'Private'
        : rawPrivacy.includes('Light') ? 'Light Crowd'
        : rawPrivacy.includes('Moderate') ? 'Moderate Crowd'
        : rawPrivacy.includes('Everyone') ? 'Everyone Will See'
        : rawPrivacy;

      const rawBudget = f['Budget'] || '';
      const budget = rawBudget === 'Free' ? 'Free'
        : rawBudget === 'Moderate' ? '$$'
        : rawBudget === 'Expensive' ? '$$$'
        : rawBudget === 'Luxury' ? '$$$$'
        : rawBudget;

      // Vibe Secondary — multi-select, filter out non-vibe values like "Luxury"
      const vibeOptions = new Set(['Beach','Mountain','Cliff','Lake','Volcano','Ocean','City','Jungle','Rural','Boat']);
      const vibeSecondaryArr = Array.isArray(f['Vibe Secondary'])
        ? f['Vibe Secondary'].filter(v => vibeOptions.has(v))
        : (f['Vibe Secondary'] ? [f['Vibe Secondary']] : []);

      const otherVibeArr = Array.isArray(f['Other Vibe'])
        ? f['Other Vibe']
        : (f['Other Vibe'] ? [f['Other Vibe']] : []);

      // Best Time — can be string or array
      const bestTime = Array.isArray(f['Best Time'])
        ? f['Best Time']
        : (f['Best Time'] ? [f['Best Time']] : []);

      // Heel / Dress Friendly — note the double space in the actual field name
      const heelFriendly = f['Heel / Dress  Friendly'] === 'Yes'
        || f['Heel / Dress Friendly'] === 'Yes'
        || f['Heel / Dress  Friendly'] === true
        || f['Heal / Dress Friendly'] === true
        || false;

      return {
        id:                      r.id,
        Name:                    f['Spot Name']               || f['Name'] || '',
        Country:                 f['Country']                 || '',
        Region:                  f['Region / Town']           || f['Region'] || '',
        Vibe:                    f['Vibe']                    || '',
        'Vibe Secondary':        vibeSecondaryArr[0]          || '',
        'Vibe Secondary All':    vibeSecondaryArr,
        'Other Vibe':            otherVibeArr,
        Privacy:                 privacy,
        Budget:                  budget,
        'Best Time':             bestTime,
        'Food & Drinks':         f['Food & Drinks']           || '',
        'Access & Effort':       f['Access & Effort']         || '',
        'Access Details':        f['Access Details']          || '',
        'Heal / Dress Friendly': heelFriendly,
        'Line Summary':          f['Line Summary']            || '',
        'Full Summary':          f['Full Summary']            || '',
        'Proposal Plan Steps':   f['Proposal Plan Steps']     || '',
        'Cover Photo':           f['Cover Photo']?.[0]?.url   || null,
        'Gallery Photos':        (f['Gallery Photos'] || []),
        'Recommended Photographer': f['Recommended Photographer'] || '',
        'Google Maps Link':      f['Google Maps Link']        || '',
        'Linked Hotel / Venue':  f['Linked Hotel / Venue']    || '',
        Published:               true,
        badge:                   f['Badge']                   || null,
        coverGradient:           f['Cover Gradient']          || 'linear-gradient(160deg,#28342c,#1e2835)',
        'Price Moment':           f['Price Moment']            || null,
        'Price Hotel Per Night':  f['Price Hotel Per Night']   || null,
        'Price Photographer':     f['Price Photographer']      || null,
        'Package Includes':       f['Package Includes']        || '',
        'Hotel Area Rate':        f['Hotel Area Rate']         || null,
        'Add-ons':                Array.isArray(f['Add-ons']) ? f['Add-ons'] : (f['Add-ons'] ? f['Add-ons'].split(/[|·,]/).map(s=>s.trim()).filter(Boolean) : []),
        'Add-on Prices':          f['Add-on Prices'] || '',
        'Photographer Note':     f['Photographer Note']       || '',
        'Peak Months':           f['Peak Months']             || '',
        'Low Months':            f['Low Months']              || '',
        'Peak Multiplier':       f['Peak Multiplier']         || 1.3,
        'Low Multiplier':        f['Low Multiplier']          || 0.85,
      };
    });
  } catch (err) {
    console.error('API fetch failed:', err);
    return MOCK_SPOTS;
  }
}

// ─────────────────────────────────────────────────────────
//  MOCK DATA (used when AIRTABLE_LIVE = false)
// ─────────────────────────────────────────────────────────
const MOCK_SPOTS = [
  {
    id: 'recJrPfNWsskQYBxP',
    Name: 'Ometepe Volcano View',
    Country: 'Nicaragua',
    Region: 'Ometepe Island',
    Vibe: 'Volcano',
    'Vibe Secondary': 'Mountain',
    'Vibe Secondary All': ['Mountain', 'Lake', 'Jungle'],
    'Other Vibe': [],
    Privacy: 'Private',
    Budget: '$$',
    'Best Time': ['Sunset'],
    'Food & Drinks': '',
    'Access & Effort': 'Easy',
    'Access Details': 'Very accessible by car and parking at the hotel',
    'Heal / Dress Friendly': true,
    'Line Summary': 'Private luxury meditation deck overlooking Concepción Volcano and Lake Nicaragua, located at Totoco Eco-Lodge.',
    'Full Summary': 'An elevated jungle meditation viewpoint at Totoco Eco-Lodge on Ometepe Island, offering uninterrupted sunset views of Concepción Volcano and Lake Nicaragua.',
    'Proposal Plan Steps': '1. Coordinate in advance with the Totoco Eco-Lodge owner to reserve the private meditation deck.\n2. Stage the experience as a casual sunset photo session. Plan to arrive around 4:00 PM for cocktails on the deck.\n3. A hidden photographer can position discreetly in advance.\n4. The ideal proposal window is around 5:00 PM as the light softens and Concepción Volcano glows.\n5. After the proposal, celebrate with champagne — Totoco can arrange a dramatic machete bottle opening.\n6. Transition into a fully private dinner on the same deck from 5:15–6:00 PM.',
    'Cover Photo': 'https://images.unsplash.com/photo-1605649487212-47bdab064df7?w=1200&q=80&fit=crop',
    'Gallery Photos': [
      { url: 'https://images.unsplash.com/photo-1605649487212-47bdab064df7?w=900&q=80&fit=crop' },
      { url: 'https://images.unsplash.com/photo-1544735716-392fe2489ffa?w=900&q=80&fit=crop' },
      { url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&q=80&fit=crop' },
      { url: 'https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?w=900&q=80&fit=crop' },
    ],
    'Recommended Photographer': 'Local Ometepe Co.',
    'Google Maps Link': 'https://www.google.com/maps/@11.507,-85.604,15z',
    'Linked Hotel / Venue': 'Totoco Eco-Lodge',
    Published: true,
    badge: 'Staff Pick',
    coverGradient: 'linear-gradient(160deg,#28342c,#1e2835)',
    'Price Moment': 297,
    'Price Hotel Per Night': 110,
    'Price Photographer': 380,
    'Package Includes': 'Private location scouting & setup · Floral arrangement at the moment · Champagne service for two · On-the-day timing management · Coordination with local partners · Dedicated planning support · Personalised proposal script guidance',
    'Hotel Area Rate': 95,
    'Add-ons': ['Flowers & décor', 'Champagne', 'Private dinner', 'Candles & lanterns', 'Live music', 'Photographer'],
    'Photographer Note': '2hr coverage · 60 edited photos · delivered in 7 days',
    'Peak Months': '1,2,3',
    'Low Months': '9,10',
    'Peak Multiplier': 1.25,
    'Low Multiplier': 0.82
  }
];

// ─────────────────────────────────────────────────────────
//  MASTER FETCH — switches between live and mock
// ─────────────────────────────────────────────────────────
async function fetchSpots() {
  if (AIRTABLE_LIVE) {
    return await fetchFromAirtable();
  }
  return MOCK_SPOTS.filter(s => s.Published === true);
}

// ─────────────────────────────────────────────────────────
//  RENDER SPOT CARDS — verbatim from index.html
// ─────────────────────────────────────────────────────────
const privacyEmojiMap = {
  'Private':'🔒','Light Crowd':'👥','Moderate Crowd':'👥👥','Everyone Will See':'👥👥👥'
};

// savedSpotIds stub — reads from localStorage so save state is consistent
let savedSpotIds = [];
try { savedSpotIds = JSON.parse(localStorage.getItem('ps_saved') || '[]'); } catch(e) {}

function buildSpotCard(s) {
  const imgStyle = s['Cover Photo']
    ? `background-image:url('${s['Cover Photo']}');background-size:cover;background-position:center;`
    : `background:${s.coverGradient || 'var(--bg3)'};`;
  const badge    = s.badge ? `<span class="spot-card-badge">${s.badge}</span>` : '';
  const saved    = (typeof savedSpotIds !== 'undefined') && savedSpotIds.includes(s.id);
  const privacy  = s.Privacy || '';
  const privEmoji = privacyEmojiMap[privacy] || '';
  const bestTime = s['Best Time'] || s['Best Time of Day'] || '';
  const hook     = s['Hook'] || s['Line Summary'] || '';
  const price    = s['Moment Price'] || s['Price'] || '';
  const priceStr = price ? `From $${Math.round(Number(price)).toLocaleString()}` : (s.Budget || '');

  return `
    <div class="spot-card" onclick="openSpotDrawer('${s.id}')" style="cursor:pointer">
      <div class="spot-card-img">
        <div class="img-bg" style="${imgStyle}"></div>
        ${badge}
        <div class="spot-save${saved?' saved':''}" data-spot-id="${s.id}" onclick="toggleSaveSpot(event,'${s.id}')">♡</div>
        <div class="spot-card-overlay">
          <span class="spot-card-market">${s.Region || ''} · ${s.Country || ''}</span>
          <div class="spot-card-name">${s.Name}</div>
          ${hook ? `<p class="spot-card-hook">${hook}</p>` : ''}
        </div>
      </div>
      <div class="spot-card-body">
        <span class="spot-card-budget-new">${priceStr}</span>
        <div class="spot-card-meta-tags">
          ${privEmoji ? `<span class="spot-card-meta-tag">${privEmoji}</span>` : ''}
          ${bestTime ? `<span class="spot-card-meta-tag">· ${bestTime}</span>` : ''}
        </div>
      </div>
    </div>`;
}

function buildCardPriceRow(s) {
  const moment = s['Price Moment'];
  const hotelNightly = s['Price Hotel Per Night'] || s['Hotel Area Rate'];
  if (!moment && !hotelNightly) return '';

  const parts = [];
  if (moment) {
    parts.push(`<span class="spot-card-price-signal">Proposal from <strong>$${Math.round(moment).toLocaleString()}</strong></span>`);
  }
  if (hotelNightly) {
    if (parts.length) parts.push('<div class="spot-card-price-divider"></div>');
    parts.push(`<span class="spot-card-price-signal">Hotels from <strong>$${Math.round(hotelNightly).toLocaleString()}/night</strong></span>`);
  }
  return `<div class="spot-card-price-row">${parts.join('')}</div>`;
}

// ─────────────────────────────────────────────────────────
//  OPEN SPOT — navigate to spot detail page
// ─────────────────────────────────────────────────────────
function openSpotDrawer(id) {
  window.location.href = '/spots/' + id;
}

function toggleSaveSpot(e, id) {
  e.stopPropagation();
  try {
    let saved = JSON.parse(localStorage.getItem('ps_saved') || '[]');
    const idx = saved.indexOf(id);
    if (idx > -1) {
      saved.splice(idx, 1);
    } else {
      saved.push(id);
    }
    localStorage.setItem('ps_saved', JSON.stringify(saved));
    savedSpotIds = saved;
    const btn = e.currentTarget;
    if (btn) btn.classList.toggle('saved', saved.includes(id));
  } catch(err) {}
}

// ─────────────────────────────────────────────────────────
//  DESTINATION ALIAS MAP — verbatim from index.html
// ─────────────────────────────────────────────────────────
const DEST_COUNTRY_MAP = {
  'Amalfi Coast':    ['italy','amalfi','positano','ravello','praiano','campania'],
  'Santorini':       ['greece','santorini','oia','fira','cyclades'],
  'Bali':            ['indonesia','bali','ubud','seminyak','canggu','uluwatu'],
  'Tulum':           ['mexico','tulum','quintana roo'],
  'Maldives':        ['maldives','indian ocean'],
  'Costa Rica':      ['costa rica'],
  'Nicaragua':       ['nicaragua'],
  'Portugal':        ['portugal','algarve','lisbon','porto','sintra'],
  'South of France': ['france','provence','south of france','côte d\'azur','cote d\'azur','nice'],
  'Switzerland':     ['switzerland','swiss','alps','bernese','grindelwald','zurich','geneva'],
};

function filterByDestination(spots, name) {
  const aliases = DEST_COUNTRY_MAP[name] || [name.toLowerCase()];
  return spots.filter(s => {
    const country = (s.Country || '').toLowerCase().trim();
    const region  = (s.Region  || '').toLowerCase().trim();
    if (!country && !region) return false;
    return aliases.some(alias =>
      country === alias || country.includes(alias) || alias.includes(country) ||
      region  === alias || region.includes(alias)  || alias.includes(region)
    );
  });
}

// ─────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────
async function init() {
  const root = document.getElementById('dest-root');

  if (!destName) {
    root.innerHTML = `
      <div class="dest-404">
        <h1>Destination not found</h1>
        <p>We don't recognise that destination. <a href="/" style="color:var(--accent)">Browse all spots →</a></p>
      </div>`;
    return;
  }

  // Set <title> and meta description
  document.getElementById('page-title').textContent =
    'Best Proposal Spots in ' + destName + ' | Proposal Spots';
  document.getElementById('page-description').setAttribute('content',
    'Discover the most romantic proposal spots in ' + destName + '. Curated locations for an unforgettable engagement.');

  // Render page shell immediately
  root.innerHTML = `
    <div class="dest-page">
      <div class="dest-header">
        <span class="dest-eyebrow">Destination</span>
        <h1 class="dest-h1">Proposal Spots in ${destName}</h1>
        <p class="dest-intro">A curated selection of the most romantic, private, and unforgettable proposal locations in ${destName}. Hand-picked by our editorial team.</p>
      </div>
      <p class="dest-results-label" id="dest-results-label">Loading spots…</p>
      <div class="spots-grid" id="dest-grid">
        <div class="dest-empty">Loading spots…</div>
      </div>
    </div>`;

  const allSpots = await fetchSpots();
  const filtered = filterByDestination(allSpots, destName);

  const grid = document.getElementById('dest-grid');
  const label = document.getElementById('dest-results-label');

  if (!filtered.length) {
    grid.innerHTML = '<div class="dest-empty">No spots found for this destination yet. Check back soon.</div>';
    if (label) label.textContent = '0 spots';
    return;
  }

  if (label) label.textContent = filtered.length + ' spot' + (filtered.length !== 1 ? 's' : '');
  grid.innerHTML = filtered.map(s => buildSpotCard(s)).join('');
}

init();
</script>

</body>
</html>
