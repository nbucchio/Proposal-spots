<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story — Proposal Spots</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F4F1EB;
      --bg2:      #EDEAE2;
      --white:    #FDFCFA;
      --ink:      #1C1C1C;
      --mid:      #6B6660;
      --muted:    #9E9890;
      --hairline: #D8D2C8;
      --accent:   #8C7B64;
    }

    html {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding-top: 64px;
    }

    .hero {
      position: relative;
      min-height: 520px;
      display: flex;
      align-items: flex-end;
      padding-bottom: 64px;
      overflow: hidden;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 80px;
      width: 100%;
    }

    .eyebrow {
      font-family: 'Jost', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(165,90,74,0.8);
      display: block;
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Cormorant', serif;
      font-size: clamp(32px, 4.5vw, 56px);
      font-weight: 300;
      color: #F4F1EB;
      line-height: 1.1;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    .dest-tag {
      display: inline-block;
      font-family: 'Jost', sans-serif;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: rgba(244,241,235,0.6);
      border: 1px solid rgba(244,241,235,0.25);
      padding: 4px 10px;
    }

    .body {
      max-width: 720px;
      margin: 0 auto;
      padding: 72px 40px;
    }

    .body p {
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: var(--mid);
      line-height: 1.95;
      letter-spacing: 0.02em;
      margin-bottom: 24px;
    }

    .not-found {
      max-width: 720px;
      margin: 6rem auto;
      padding: 0 40px;
      text-align: center;
    }

    .not-found h1 {
      font-family: 'Cormorant', serif;
      font-size: 2rem;
      font-weight: 300;
      color: var(--ink);
      margin-bottom: 1rem;
    }

    .not-found a {
      color: var(--accent);
      text-decoration: none;
    }

    .story-back {
      background: none;
      border: none;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 300;
      color: var(--ink);
      opacity: 0.5;
      cursor: pointer;
      padding: 0;
      margin: 32px 40px;
      display: block;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .story-back:hover { opacity: 1; }

    @media (max-width: 900px) {
      .hero { min-height: 360px; padding-bottom: 40px; }
      .hero-inner { padding: 0 28px; }
      .body { padding: 48px 28px; }
      .story-back { margin: 24px 28px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="../nav.js"></script>
  <script>
    const STORY_DATA = {
      'amalfi': {
        eyebrow: 'Amalfi Coast, Italy · June 2024',
        title: 'He told her it was just lunch. She had no idea about the lemon grove.',
        dest: 'Amalfi Coast',
        photo: 'https://images.unsplash.com/photo-1516483638261-f4dbaf036963?w=1200&q=80&fit=crop',
        body: `<p>James had been planning for four months. He had dismissed a dozen ideas — a boat trip, a rooftop restaurant, a beach at sunset — before a local hotel owner mentioned a private terrace carved into the cliffside above Positano. It was invisible from the path below. Most people walk past without ever knowing it exists.</p><p>He booked it in January for a June trip. He told no one except the hotel, the guitarist, and the photographer he had hired to be in position before they arrived.</p><p>Sarah had been told they were going for a late lunch. When they arrived at the terrace and she saw the table set with wildflowers — which James had picked himself that morning, getting up at six to find them before she woke — she assumed it was the hotel's standard decoration.</p><p>James had timed everything to the minute. When she turned to ask why he'd gone so quiet, he was already on one knee. She said yes before he finished the sentence.</p>`
      },
      'bali-rice': {
        eyebrow: 'Tegallalang, Ubud, Bali · February 2024',
        title: 'He woke her at 4:30am. She was furious. Then she saw the rice terraces.',
        dest: 'Bali',
        photo: 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1200&q=80&fit=crop',
        body: `<p>Emma's exact words at 4:30am were, by her own account, unprintable. Marcus had shaken her awake, told her they needed to leave immediately, and handed her clothes without explanation. She describes her mood as "not ideal."</p><p>What she didn't know was that Marcus had arranged private early-morning access to the Tegallalang rice terraces — the same terraces that draw hundreds of tourists by 8am, but at 5am belong entirely to the mist and the birds and whoever is there first.</p><p>Emma still maintains she did not fully forgive the 4:30am wakeup until approximately forty minutes after the proposal, when she saw the photographs. Marcus disagrees with this timeline.</p>`
      },
      'maldives': {
        eyebrow: 'North Malé Atoll, Maldives · December 2023',
        title: 'The sandbank disappears at high tide. They had twenty minutes.',
        dest: 'Maldives',
        photo: 'https://images.unsplash.com/photo-1514282401047-d79a71a590e8?w=1200&q=80&fit=crop',
        body: `<p>The sandbank appears for approximately three hours per day, depending on the tide. At its widest, it is perhaps sixty metres long and eight metres across — a strip of white sand in the middle of the Indian Ocean, surrounded by water in every direction.</p><p>Daniel had been corresponding with the resort concierge for two weeks. He had the tide tables. He had the champagne requested, the rose petals arranged, the exact sunset time calculated to within a minute.</p><p>He dropped to one knee as the sun hit the horizon. The water was already at their ankles when they finally broke the embrace. They made it back to the seaplane with three minutes to spare.</p>`
      },
      'santorini': {
        eyebrow: 'Oia, Santorini, Greece · August 2024',
        title: 'She bought the dress that morning. He had planned everything around a different one.',
        dest: 'Santorini',
        photo: 'https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?w=1200&q=80&fit=crop',
        body: `<p>The dress was black and gold, handmade on the island, spotted in a boutique in Oia on what Lexi thought was just a morning of wandering. Her partner had arranged a private clifftop dinner for that evening, timed to the second of sunset, with a photographer in position below the terrace.</p><p>He had planned the proposal for a different dress entirely. The black and gold was, in his words, "an upgrade I didn't deserve credit for."</p><p>He read her a letter. Eight minutes later, he got down on one knee. The Aegean turned pink behind them. They are still together. The dress is framed.</p>`
      },
      'costa-rica': {
        eyebrow: 'Monteverde Cloud Forest, Costa Rica · March 2024',
        title: 'Suspended in the mist. 150 metres above the jungle. She said yes eleven times.',
        dest: 'Costa Rica',
        photo: 'https://images.unsplash.com/photo-1544735716-392fe2489ffa?w=1200&q=80&fit=crop',
        body: `<p>The private hanging bridge tour was booked as a "sunrise nature walk." Just the two of them and a local guide, starting before the cloud forest opened to regular visitors.</p><p>Standing on a suspension bridge in the mist, the jungle canopy spread out beneath them and the clouds moving through at eye level, Luca asked. Sofia laughed first. Then she cried. Then she said yes.</p><p>According to Luca, she said it eleven times on the walk back down. Sofia maintains the number was four. The guide has confirmed eleven.</p>`
      },
      'tulum': {
        eyebrow: 'Cenote Dos Ojos, Tulum, Mexico · April 2024',
        title: 'The cenote was empty at sunrise. He had arranged that too.',
        dest: 'Tulum',
        photo: 'https://images.unsplash.com/photo-1682687220742-aba13b6e50ba?w=1200&q=80&fit=crop',
        body: `<p>Getting private access to a cenote near Tulum before the tourists arrive requires knowing the right person. Jake had been corresponding with a local guide for six weeks.</p><p>He had wrapped the ring in a handwritten note and placed it inside a small woven bag from the local market. She assumed it was a trinket. When she unfolded the note, her hands were shaking before she opened the box.</p><p>She says the cenote proposal was the most beautiful thing she has ever experienced. He is fairly confident she also means the cenote.</p>`
      },
      'algarve': {
        eyebrow: 'Benagil Sea Cave, Algarve, Portugal · September 2024',
        title: 'He kayaked into a hidden sea cave with a ring in a dry bag and a plan that nearly got waterlogged.',
        dest: 'Algarve',
        photo: 'https://images.unsplash.com/photo-1555881400-74d7acaacd8b?w=1200&q=80&fit=crop',
        body: `<p>The Benagil Cave is accessible only by water. Most visitors arrive on tourist boats and see it from a distance. Getting inside — actually standing on the small beach inside the cave — requires a kayak, good timing, and a willingness to get wet.</p><p>The ring, wrapped in waterproof cloth and placed in a dry bag he had tested twice in the bath at home, survived the journey intact. The plan, as he would later admit, had a few moments of uncertainty near the cave entrance.</p><p>She said yes inside the cave, the light coming through the hole in the ceiling, the Atlantic framing the exit. He considers this the best decision of his life. She considers the dry bag a romantic detail that took her some time to appreciate.</p>`
      },
      'provence': {
        eyebrow: 'Valensole, Provence, France · July 2024',
        title: 'He had been writing her letters for three years. She found out in a lavender field.',
        dest: 'South of France',
        photo: 'https://images.unsplash.com/photo-1499856871958-5b9357976b82?w=1200&q=80&fit=crop',
        body: `<p>Marc had been writing Isabelle letters since their second month together. Not sending them — just writing them, folding them, placing them in a small leather-bound book he kept in the bottom drawer of his desk. By July 2024, there were forty-one letters. She had no idea any of them existed.</p><p>He arranged a sunset access to a lavender farm near Valensole — private, end of day, when the tour groups were gone and the fields smelled strongest. He told Isabelle a photographer friend wanted to do a portrait session. She wore a white dress, which she insists was a coincidence.</p><p>When they reached the far edge of the field, Marc stopped walking and handed her the book. He told her what it was. She opened it. She read the first letter standing up. She read the second sitting down in the lavender. She started the third, stopped partway through, and looked up at him. She didn't need to read the rest.</p><p>He proposed in the field as the sun went down over the hills. Isabelle says she has now read all forty-one letters. She says the forty-first is her favourite. Marc won't say what it says.</p>`
      },
      'switzerland': {
        eyebrow: 'Bernese Oberland, Switzerland · October 2024',
        title: 'A private cable car. Dusk. The Jungfrau. He had the date engraved inside the band.',
        dest: 'Switzerland',
        photo: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=80&fit=crop',
        body: `<p>Oliver had researched the Bernese Oberland for four months before finding the spot: a cable car station above the valley that locals used but tourists almost never discovered, with an unobstructed view of the Jungfrau on one side and the Eiger on the other. No signage directing people to it. No entry in the guidebooks.</p><p>He had arranged private access at dusk. He told Claire they were going for dinner in the village. She spent the cable car ride convinced something was wrong with him because he kept looking out the window and not speaking.</p><p>When they stepped out onto the platform and she saw the Jungfrau in the last light — snowfields turning amber, the valley below in shadow, everything perfectly still — she said nothing for almost a minute. Oliver says it was the most peaceful sixty seconds of his life. Then he reached into his coat. She turned. He says she cried before he said a word.</p><p>She discovered the engraved date on the inside of the band the following morning.</p>`
      },
      'nicaragua': {
        eyebrow: 'Isla de Ometepe, Nicaragua · January 2024',
        title: 'No roads reach it. No tour boats stop there. She had absolutely no idea.',
        dest: 'Nicaragua',
        photo: 'https://images.unsplash.com/photo-1605649487212-47bdab064df7?w=1200&q=80&fit=crop',
        body: `<p>Ryan arrived on Ometepe three days before Natalie. He had one task: find the place. He rented a bicycle, explored the island's unpaved roads, and eventually asked a fisherman who took him by boat around the far side — where the two volcanos meet the lake and the jungle comes down to a black sand cove with no road access, no boat traffic, and no other tourists.</p><p>He spent the next three days establishing whether the boatman would be willing to take them there at sunset. The boatman said yes. Ryan booked it.</p><p>Natalie arrived on a Wednesday. Ryan told her they were going exploring. When the wooden boat rounded the headland and the cove opened up — obsidian sand, a wall of jungle, the twin peaks of Concepción and Maderas reflected perfectly in the still water — Natalie said nothing. Just: oh.</p><p>He asked her to marry him as the sun went behind the western peak. She said yes before the light was gone.</p>`
      },
      'costa-rica-waterfall': {
        eyebrow: 'Arenal, Costa Rica · April 2024',
        title: 'He planned for six months. The waterfall did the rest.',
        dest: 'Costa Rica',
        photo: 'https://images.unsplash.com/flagged/photo-1579353920811-40f13606f8df?q=80&w=1200&auto=format&fit=crop',
        body: `<p>Will had been in contact with a local guide near Arenal for six months before Camila ever knew anything was being planned. He wanted one specific thing: a waterfall with no other tourists, reachable by trail, at a time of day when the light came through the canopy at the right angle.</p><p>He told Camila they were doing a morning hike. She packed sunscreen and a light jacket. The falls dropped into a wide natural pool, surrounded on three sides by cloud forest. The mist from the base caught the early light and turned everything soft. The guide had stepped off the path well before they arrived.</p><p>Will waited. When Camila walked to the edge and turned to say something about the light, he was already down on one knee.</p><p>She said later that she had been completely silent for about thirty seconds after he asked. They swam in the pool after. He had not planned that part. It turned out to be the best part.</p>`
      },
      'maldives-overwater': {
        eyebrow: 'South Male Atoll, Maldives · January 2025',
        title: 'The Indian Ocean at their feet. She had no idea the champagne was already chilled.',
        dest: 'Maldives',
        photo: 'https://images.unsplash.com/photo-1615920292477-7ffd3935672c?q=80&w=1200&auto=format&fit=crop',
        body: `<p>Finn had booked the overwater villa seven months in advance, at a resort in the South Male Atoll he had researched for three weeks. He chose it for one reason: the deck faced due west, unobstructed, with open ocean to the horizon and nothing between the railing and the sunset.</p><p>Nadia thought the trip was a belated birthday present. The concierge had arranged everything for their first evening: a small table set for two at the very edge of the deck, the champagne they had shared on their first anniversary chilling in a bucket at the railing, and a photographer who had arrived by kayak from the adjacent bungalow.</p><p>Nadia walked out ahead of him, saw the setup, and stopped dead at the threshold. She turned slowly. He was already on one knee behind her, the Indian Ocean spread out to the horizon.</p><p>She said yes immediately and then asked how long he had been planning it. He said seven months. She said that explained a lot of things she had found confusing.</p>`
      },
      'santorini-caldera': {
        eyebrow: 'Oia, Santorini, Greece · May 2024',
        title: 'The whole island was watching the sunset. Only she did not see it coming.',
        dest: 'Santorini',
        photo: 'https://images.unsplash.com/photo-1738581505892-ae835e6f35d5?q=80&w=1200&auto=format&fit=crop',
        body: `<p>Every evening in Oia, the cliffside fills with people. Hundreds of them, lining the walls and terraces, watching the sun drop behind the caldera rim. Alex had decided months earlier that this was not a limitation — it was cover.</p><p>He had arranged a private terrace above the public viewing area: a small whitewashed platform belonging to a boutique hotel, accessible only to guests, with an unobstructed line of sight directly over the caldera. He told Sophia they had a dinner reservation.</p><p>Alex had been carrying the ring for three weeks — through Paris, through Athens, through two days in Santorini waiting for the right evening. When Sophia turned her head at the sound of her name, he was on one knee. She said later that she did not process what she was seeing for a full two seconds.</p><p>The crowd below on the public walkway began to applaud. Alex had not planned that part. He considers it the best unplanned detail of the entire evening.</p>`
      },
      'portugal-cliffs': {
        eyebrow: 'Sintra and Cabo da Roca, Portugal · October 2024',
        title: 'He had the ring in his pocket for three days. The right moment kept being the next one.',
        dest: 'Portugal',
        photo: 'https://images.unsplash.com/photo-1474552226712-ac0f0961a954?q=80&w=1200&auto=format&fit=crop',
        body: `<p>Sam had flown from London with the ring already packed. The first evening in Lisbon, he had almost asked at a rooftop bar in Alfama. Too many people at adjacent tables. The second day, walking through Belem at sunset, he had reached into his pocket and then stopped. Not quite.</p><p>On the third day they drove out to Sintra and walked up through the palace grounds to Cabo da Roca — the westernmost point of continental Europe, where the continent simply stops and the ocean takes over.</p><p>The light in October in Portugal has a particular quality: low and warm, the shadows long, everything slightly amber. When Ana walked to the edge and stood looking west, the wind coming off the ocean and the light turning her hair gold, Sam understood that this was the moment.</p><p>He walked up beside her. She thought he was going to say something about the view. He said something else entirely. She turned. He was already down on one knee on the pale stone, the Atlantic and the whole sky behind him. She said yes and then laughed and then said yes again and then started crying, in that order, very quickly.</p>`
      },
      'australia-coast': {
        eyebrow: 'Great Ocean Road, Victoria, Australia · March 2025',
        title: 'She grew up an hour from here. He flew twelve thousand kilometres to ask.',
        dest: 'Australia',
        photo: 'https://images.unsplash.com/photo-1742358613913-71ffdfb07512?q=80&w=1200&auto=format&fit=crop',
        body: `<p>Jade had talked about the Great Ocean Road since the first month they were together — the drive her family had done when she was twelve, the limestone stacks rising from the Southern Ocean, the way she had pressed her face against the car window and decided the world was enormous and worth exploring.</p><p>Four months before the trip, Tom began planning. He booked flights to Melbourne, arranged a hire car, and found a photographer based in Warrnambool who specialised in sunrise shoots at the Twelve Apostles.</p><p>They arrived at the Twelve Apostles viewpoint before sunrise, in the dark. The sky was deep blue and the stacks were silhouettes against the pale horizon. Jade stood at the railing and watched the light come. When the sun cleared the cliff line and the ocean turned gold, she exhaled and said she had forgotten how big it was.</p><p>Tom waited for one more moment — the instant the light hit the nearest stack full on and turned it amber. Then he turned, reached into his jacket, and went down on one knee. Jade cried before he finished the question.</p>`
      },
      'swiss-bridge': {
        eyebrow: 'Swiss Alps, Switzerland · September 2024',
        title: 'He stopped in the middle of the bridge. She thought he was looking at the view.',
        dest: 'Switzerland',
        photo: 'https://images.unsplash.com/photo-1566759996874-04d713cc224a?q=80&w=1200&auto=format&fit=crop',
        body: `<p>Thomas had walked this bridge once before, two years earlier, on a solo hiking trip through the Swiss Alps. He remembered standing at the midpoint and thinking: this is where you bring someone when you want everything else to disappear. The gorge below. The peaks above. No road noise, no crowds — just the sound of the river and the wind moving through the pines.</p><p>He filed it away. Then he met Clara.</p><p>He spent eight months planning the right moment to return. He booked a small mountain guesthouse nearby, arranged a late-morning start so the bridge would be theirs before the day walkers arrived, and told her they were doing an easy trail.</p><p>Clara was looking over the railing at the valley floor when Thomas turned. He dropped to one knee on the wooden planks. She didn't notice until she turned around. She later said the view made her gasp, and then she turned and gasped again for a completely different reason.</p><p>They are getting married in Switzerland. Clara says the venue has to have a view.</p>`
      },
      'dolomites': {
        eyebrow: 'Dolomites, Italy · August 2024',
        title: 'They had been coming here for thirty years. He finally asked on the last evening.',
        dest: 'Dolomites',
        photo: 'https://images.unsplash.com/photo-1696889520848-2ec1ddefc297?q=80&w=1200&auto=format&fit=crop',
        body: `<p>Robert and Elise first came to the Dolomites in their late twenties — a walking holiday they nearly did not take, booked on a whim after a longer trip fell through. They spent a week in a small village in the Val Gardena, walked every trail they could find, and left agreeing they would come back.</p><p>They did come back. Seven more times over thirty years. The Dolomites were theirs in the way that a place becomes yours when you return to it long enough.</p><p>This August, on the last evening of their eighth trip, Robert took Elise back to the ridge they had first walked together three decades earlier. The light was the same — that particular late-summer gold that turns the pale rock faces amber and makes the valley below look like something from a painting.</p><p>He asked her to marry him as the sun went behind the western ridge. She said she had been waiting for him to ask since the second visit.</p>`
      },
      'bali-temple': {
        eyebrow: 'Ubud, Bali, Indonesia · March 2024',
        title: 'She had been wanting to come to Bali for five years. He made sure it was worth the wait.',
        dest: 'Bali',
        photo: 'https://plus.unsplash.com/premium_photo-1661892226787-4e37afae9740?q=80&w=1200&auto=format&fit=crop',
        body: `<p>Priya had kept a travel list since university. Bali was always near the top. When Aarav said they were finally going, she assumed it was a holiday. She started researching immediately. She was planning their itinerary on the flight over when he closed her laptop gently and said he had already taken care of the last evening.</p><p>Aarav had been in contact with a private villa coordinator in Ubud for eight weeks. He had arranged a candlelit terrace above the jungle canopy at golden hour, with a local floral artist who had spent two days creating a path of fresh frangipanis from the villa entrance through the garden.</p><p>Priya stopped walking when she turned the corner and saw the path. She looked at him. He nodded. She looked back at the flowers. He had already moved to the end of the path and was on one knee by the time she reached him.</p><p>She cried before she arrived. He considers this the best possible outcome.</p>`
      },
      'tulum-jungle': {
        eyebrow: 'Tulum, Mexico · February 2024',
        title: 'She chose the destination. He arrived with a plan she knew nothing about.',
        dest: 'Tulum',
        photo: 'https://images.unsplash.com/photo-1550155888-430386a434b4?q=80&w=1200&auto=format&fit=crop',
        body: `<p>Valentina found the eco-lodge on a travel blog and had the flights booked before the end of the week. She had been talking about Tulum for two years. The morning she booked the flights, Diego called the lodge.</p><p>He spent the next six weeks in quiet correspondence with the owner — arranging a private rooftop terrace for their last evening, a local chef, candles, and one other thing: a small cream envelope, to be placed inside the dinner menu before they arrived.</p><p>Valentina opened the envelope as they sat down to dinner on the final night. She assumed it was a welcome card. She began to read. Her expression changed partway through the first paragraph.</p><p>Diego had written the letter on the plane. He had rewritten it four times. The version she received was the fifth draft. She looked up from the letter. He was already standing.</p>`
      },
      'nicaragua-beach': {
        eyebrow: 'Pacific Coast, Nicaragua · November 2024',
        title: 'Most people never make it this far. That was exactly the point.',
        dest: 'Nicaragua',
        photo: 'https://images.unsplash.com/photo-1611070674042-3957c8a7f700?q=80&w=1200&auto=format&fit=crop',
        body: `<p>Connor had found the beach on his first trip to Nicaragua, years before he met Maya. Three hours of unpaved track through the jungle, a river crossing, then a short boat ride. No hotels. No tour operators. Just a long curve of black volcanic sand, the Pacific breaking in long clean sets, and a horizon with nothing between you and Hawaii.</p><p>When he told Maya they were going somewhere remote, she asked how remote. He said fairly remote. She packed accordingly.</p><p>They arrived at the beach at sunset. The light was coming from behind the tree line, turning the black sand deep purple at the waterline. There was no one else anywhere. Maya stood at the edge of the water for a long moment, and then turned and laughed and said it was completely ridiculous that a place like this existed.</p><p>Connor said he agreed. Then he reached into his bag. She said yes with her feet still in the water.</p>`
      }
    };

    const params = new URLSearchParams(window.location.search);
    const key = params.get('story');
    const story = key && STORY_DATA[key];
    const app = document.getElementById('app');

    if (story) {
      document.title = story.dest + ' Proposal Story — Proposal Spots';
      app.innerHTML = `
        <button class="story-back" onclick="location.href='../inspiration.html'">← Back to Stories</button>
        <div class="hero" style="background: linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.6)), url('${story.photo}') center/cover;">
          <div class="hero-inner">
            <div class="eyebrow">${story.eyebrow}</div>
            <h1>${story.title}</h1>
            <span class="dest-tag">${story.dest}</span>
          </div>
        </div>
        <div class="body">${story.body}</div>
      `;
    } else {
      app.innerHTML = `
        <div class="not-found">
          <h1>Story not found</h1>
          <p><a href="../index.html">← Back to Proposal Spots</a></p>
        </div>
      `;
